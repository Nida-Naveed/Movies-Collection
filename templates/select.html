{% extends 'base.html' %}

{% block title %}Select Movie{% endblock %}

{% block content %}
<div class="container">
    <h1 class="heading mt-4">Select Movie</h1>
  <p>
      <ul>

      {% for movie in response["results"] %}
    <li><a href="{{ url_for('movie',movie_id=movie['id']) }}"> {{ movie["title"] }}</a></li>
      {% endfor %}

        </ul>
    </p>
</div>
{% endblock %}
